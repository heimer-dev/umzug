services:
  umzug:
    build: .
    container_name: umzug-labels
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - umzug-data:/app/data
    environment:
      PORT: 8080

      # WICHTIG: Diesen Wert auf einen langen, zufälligen String setzen!
      # Beispiel: openssl rand -hex 32
      SESSION_SECRET: "bitte-aendern-langer-zufaelliger-string"

      # BASE_URL nur bei Reverse Proxy / eigenem Domain-Namen nötig:
      # BASE_URL: "https://umzug.schule.de"

      # Schulnetz vom Rate-Limiting ausnehmen (komma-getrennte IP-Präfixe):
      # TRUSTED_NETWORKS: "192.168.1.,10.0.0."

volumes:
  umzug-data:
    driver: local
