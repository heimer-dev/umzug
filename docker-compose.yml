services:
  umzug:
    build: .
    container_name: umzug-labels
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - umzug-data:/app/data
    environment:
      PORT: 3000
      # BASE_URL wird automatisch aus dem Request-Header ermittelt.
      # Setze diese Variable nur, wenn die automatische Erkennung nicht funktioniert,
      # z.B. hinter einem Reverse Proxy mit eigenem Domain-Namen:
      #
      # BASE_URL: "https://umzug.meinedomain.de"
      #
      # Oder mit IP-Adresse (Port weglassen wenn Standard 80/443):
      # BASE_URL: "http://192.168.1.100:3000"

volumes:
  umzug-data:
    driver: local
