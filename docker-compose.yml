services:
  umzug:
    build: .
    container_name: umzug-labels
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - umzug-data:/app/data
    environment:
      PORT: 8080
      # BASE_URL wird automatisch aus dem Request-Header ermittelt.
      # Setze diese Variable nur bei Reverse Proxy / eigenem Domain-Namen:
      # BASE_URL: "https://umzug.schule.de"

      # IPs / Netz-Präfixe die vom Rate-Limiting ausgenommen sind (Schulnetz).
      # Komma-getrennt, z.B. internes WLAN + Lehrernetz:
      # TRUSTED_NETWORKS: "192.168.1.,10.0.0."

volumes:
  umzug-data:
    driver: local
