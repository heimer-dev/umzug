<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umzugskarton Labels</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>&#128230; Umzugskarton Labels</h1>
    <p class="subtitle">QR-Code Labels erstellen, drucken und scannen</p>
  </header>

  <main>
    <!-- Form -->
    <section class="card form-card">
      <h2 id="form-title">Neuen Karton anlegen</h2>
      <form id="box-form">
        <input type="hidden" id="edit-id">

        <div class="form-row">
          <div class="form-group">
            <label for="label">Bezeichnung / Nummer</label>
            <input type="text" id="label" placeholder="z.B. Karton 1 - Bücher" required>
          </div>
          <div class="form-group">
            <label for="color">Raumfarbe</label>
            <select id="color" required>
              <option value="">-- Raum wählen --</option>
              <option value="wohnzimmer">&#127968; Wohnzimmer</option>
              <option value="schlafzimmer">&#128716; Schlafzimmer</option>
              <option value="kueche">&#127859; Küche</option>
              <option value="bad">&#128704; Bad</option>
              <option value="kinderzimmer">&#129981; Kinderzimmer</option>
              <option value="buero">&#128188; Büro / Arbeitszimmer</option>
              <option value="keller">&#128348; Keller / Lager</option>
              <option value="dachboden">&#127968; Dachboden</option>
              <option value="flur">&#128682; Flur / Eingang</option>
              <option value="sonstiges">&#128230; Sonstiges</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="old_room">Alter Raum (kommt von)</label>
            <input type="text" id="old_room" placeholder="z.B. Wohnzimmer Alt-Wohnung" required>
          </div>
          <div class="form-group">
            <label for="new_room">Neuer Raum (kommt nach)</label>
            <input type="text" id="new_room" placeholder="z.B. Wohnzimmer Neue Wohnung" required>
          </div>
        </div>

        <div class="form-group">
          <label for="contents">Inhalt (eine Zeile pro Gegenstand)</label>
          <textarea id="contents" rows="4" placeholder="Bücher&#10;Aktenordner&#10;Schreibtischlampe"></textarea>
        </div>

        <div class="form-group">
          <label for="notes">Hinweise / Notizen</label>
          <input type="text" id="notes" placeholder="z.B. Zerbrechlich! Oben lassen.">
        </div>

        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">&#10003; Karton speichern</button>
          <button type="button" id="cancel-edit" class="btn btn-secondary" style="display:none">Abbrechen</button>
        </div>
      </form>
    </section>

    <!-- Box list -->
    <section class="card">
      <div class="list-header">
        <h2>Kartons (&#8203;<span id="box-count">0</span>)</h2>
        <div class="list-actions">
          <input type="text" id="search" placeholder="&#128269; Suchen..." class="search-input">
          <button class="btn btn-outline" id="print-all-btn">&#128438; Alle drucken</button>
        </div>
      </div>
      <div id="box-list" class="box-grid"></div>
    </section>
  </main>

  <!-- Print overlay -->
  <div id="print-modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Label Vorschau</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="print-area"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="window.print()">&#128438; Drucken</button>
        <button class="btn btn-secondary" id="modal-close-btn">Schliessen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
