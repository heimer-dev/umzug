<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Berufskolleg Umzug</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">&#127979;</div>
    <h1 class="auth-title">Anmelden</h1>
    <p class="auth-subtitle">Berufskolleg Umzug – Label-Verwaltung</p>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" placeholder="Benutzername" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Passwort" required autocomplete="current-password">
      </div>
      <div id="error-msg" class="auth-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        &#8594; Anmelden
      </button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Bitte warten...';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Anmeldung fehlgeschlagen.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '→ Anmelden';
      } else {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
