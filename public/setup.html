<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ersteinrichtung – Berufskolleg Umzug</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">&#127979;</div>
    <h1 class="auth-title">Ersteinrichtung</h1>
    <p class="auth-subtitle">Lege das erste Admin-Konto an. Dieses Konto kann später weitere Benutzer hinzufügen.</p>

    <form id="setup-form" class="auth-form">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" placeholder="z.B. admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Passwort <span class="label-hint">(mind. 6 Zeichen)</span></label>
        <input type="password" id="password" placeholder="Passwort" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="password2">Passwort wiederholen</label>
        <input type="password" id="password2" placeholder="Passwort bestätigen" required autocomplete="new-password">
      </div>
      <div id="error-msg" class="auth-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
        &#10003; Admin-Konto erstellen
      </button>
    </form>
  </div>

  <script>
    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('submit-btn');

      errorEl.classList.add('hidden');

      if (password !== password2) {
        errorEl.textContent = 'Passwörter stimmen nicht überein.';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Bitte warten...';

      const res = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Fehler beim Einrichten.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '✓ Admin-Konto erstellen';
      } else {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
